              "error": "#ffaa00",
              "on-error": "#000000",
              "error-container": "#4d3300",
              "on-error-container": "#ffe5b3",
              "background": "#05050f",
              "on-background": "#e2e8f0",
              "surface": "#0a0a1a",
              "on-surface": "#f8fafc",
              "surface-variant": "#15152e",
              "on-surface-variant": "#94a3b8",
              "surface-container-lowest": "#05050f",
              "surface-container-low": "#0a0a1a",
              "surface-container": "#101026",
              "surface-container-high": "#15152e",
              "surface-container-highest": "#1a1a38",
              "surface-bright": "#1a1a38",
              "surface-dim": "#05050f",
              "outline": "#334155",
              "outline-variant": "#1e293b",
              "primary-fixed": "#ffb3c6",
              "primary-fixed-dim": "#ff80a3",
              "on-primary-fixed": "#330012",
              "on-primary-fixed-variant": "#660024",
              "secondary-fixed": "#ffb3c6",
              "secondary-fixed-dim": "#ff80a3",
              "on-secondary-fixed": "#330012",
              "on-secondary-fixed-variant": "#660024",
              "tertiary-fixed": "#b3fcff",
              "tertiary-fixed-dim": "#80faff",
              "on-tertiary-fixed": "#00262e",
              "on-tertiary-fixed-variant": "#004d5c",

              "xl": "0.5rem",

            },
            "spacing": {
              "tightGap": "8px",
              "containerPadding": "24px",
              "componentGap": "12px",

    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .icon-fill {
        font-variation-settings: 'FILL' 1;
      }
      
      /* Neon Tokyo Glow Effects */
      .border-outline-variant, .border-outline {
        border-color: rgba(255, 45, 120, 0.2) !important;
      }
      .bg-surface-container-lowest, .bg-surface {
        box-shadow: 0 0 15px rgba(255, 45, 120, 0.05);
      }
      .text-primary, .text-secondary {
        text-shadow: 0 0 8px rgba(255, 45, 120, 0.4);
      }
      .bg-primary {
        box-shadow: 0 0 12px rgba(255, 45, 120, 0.6);
      }
      
      /* Custom scrollbar for clean look */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background-color: rgba(255, 45, 120, 0.3);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: rgba(255, 45, 120, 0.6);
      }
      
      .pulse-dot {
        animation: pulse-pink 2s infinite;
      }
      .pulse-error {
        animation: pulse-red 1.5s infinite;
      }
      .glow-text-pink {
        text-shadow: 0 0 8px rgba(255, 45, 120, 0.6);
      }
      .glow-text-blue {
        text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
      }
      .glow-border-pink {
        box-shadow: 0 0 10px rgba(255, 45, 120, 0.3);
        border-color: rgba(255, 45, 120, 0.5);
      }
      @keyframes pulse-pink {
        0% { box-shadow: 0 0 0 0 rgba(255, 45, 120, 0.7); }
        70% { box-shadow: 0 0 0 6px rgba(255, 45, 120, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 45, 120, 0); }
      }
      @keyframes pulse-red {
        0% { box-shadow: 0 0 0 0 rgba(255, 180, 171, 0.7); }
        70% { box-shadow: 0 0 0 8px rgba(255, 180, 171, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 180, 171, 0); }
      }
      .terminal-grid {
        background-image: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
        background-size: 20px 20px;
      }
    </style>
  </head>
  <body class="bg-background text-on-surface font-body-md text-body-md antialiased min-h-screen selection:bg-primary selection:text-on-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
